name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  RUSTFLAGS: "-D warnings"

jobs:
  verify:
    # windows-latest: hace falta MSVC + WebView2 para linkear el crate de Tauri.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci

      - name: cf-core (workspace raíz)
        run: |
          cargo fmt --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace

      - name: src-tauri (workspace propio)
        working-directory: src-tauri
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test
          cargo build

      - name: frontend
        run: |
          npx tsc --noEmit
          npm run build

  # Ejercita el empaquetado real (tauri build exige bundle.icon y compila el
  # bundle) — es caro, así que solo corre en tags de release, no en cada push.
  bundle:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: tauri build
        run: npm run tauri build
